<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Can We Talk? ♡</title>
<style>
  body {
    margin: 0;
    background: #ffeef2;
    font-family: 'Comic Sans MS', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    background-image: radial-gradient(#ffccd5 1px, transparent 1px);
    background-size: 20px 20px;
  }
  #letter-container {
    text-align: center;
    position: relative;
  }
  .envelope {
    width: 150px;
    cursor: pointer;
    transition: transform 0.3s;
  }
  .envelope:hover { transform: scale(1.1); }
  .first-note {
    color: #e75480;
    font-size: 14px;
    margin-top: 8px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .letter-window {
    display: none;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 320px;
  }
  #letter-title { color: #e75480; }
  #letter-message { color: #555; font-size: 15px; line-height: 1.5; margin: 15px 0; }
  .my-photo { 
    width: 120px; 
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    margin: 10px 0;
    border: 3px solid #ff8fab;
  }
  .buttons { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
  .btn { 
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
    font-family: 'Comic Sans MS', cursive;
  }
  .yes-btn { background: #ff8fab; color: white; }
  .no-btn { background: #e0e0e0; color: #555; }
  .btn:hover { transform: scale(1.1); }
  .final-text { color: #e75480; font-size: 18px; margin-top: 20px; }
</style>
</head>
<body>

<div id="letter-container">
  <div id="envelope-screen">
    <img src="IMG-20260519-WA0036.jpg" class="envelope" id="envelope" alt="Letter">
    <p>♡ Can we talk? ♡</p>
    <p class="first-note">click the image</p>
  </div>

  <div class="letter-window" id="letter-window">
    <h1 id="letter-title">I messed up...</h1>
    <img src="IMG-20260519-WA0036.jpg" class="my-photo" id="letter-photo" alt="me">
    
    <p id="letter-message">
      I know I hurt you and I'm really sorry.<br>
      I miss us. Can I please get a <strong>second chance</strong>?
    </p>

    <div class="buttons" id="letter-buttons">
      <button class="btn yes-btn" id="yesBtn">Yes</button>
      <button class="btn no-btn" id="noBtn">No</button>
    </div>

    <p id="final-text" class="final-text" style="display: none;">
      <strong>Thank you ♡</strong><br>Can we meet and talk?
    </p>
  </div>
</div>

<script>
  const envelope = document.getElementById('envelope');
  const envelopeScreen = document.getElementById('envelope-screen');
  const letterWindow = document.getElementById('letter-window');
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const finalText = document.getElementById('final-text');
  const letterTitle = document.getElementById('letter-title');
  const letterMessage = document.getElementById('letter-message');

  envelope.onclick = () => {
    envelopeScreen.style.display = 'none';
    letterWindow.style.display = 'block';
  }

  yesBtn.onclick = () => {
    letterTitle.innerText = "Thank you for another chance";
    letterMessage.style.display = 'none';
    document.getElementById('letter-buttons').style.display = 'none';
    finalText.style.display = 'block';
  }

  let noClicks = 0;
  noBtn.onmouseover = () => {
    noClicks++;
    noBtn.style.position = 'relative';
    noBtn.style.left = Math.random() * 100 - 50 + 'px';
    noBtn.style.top = Math.random() * 100 - 50 + 'px';
    if(noClicks > 3) noBtn.style.display = 'none';
  }
</script>
</body>
</html>
